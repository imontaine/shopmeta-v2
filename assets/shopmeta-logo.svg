<svg xmlns="http://www.w3.org/2000/svg" width="512" height="120" viewBox="0 0 512 120">
  <defs>
    <style>
      @font-face {
        font-family: 'PJS';
        font-weight: 800;
        src: url(data:font/truetype;base64,) format('truetype');
      }
      .logo-text {
        font-family: 'PJS', sans-serif;
        font-weight: 800;
        font-size: 52px;
        letter-spacing: -1.6px;
        fill: #171717;
