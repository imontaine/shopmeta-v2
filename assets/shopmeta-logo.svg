    </style>
  </defs>

  <!-- Barcode icon -->
  <g transform="translate(18, 18) scale(3.5)" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 5v14"/>
    <path d="M8 5v14"/>
    <path d="M12 5v14"/>
    <path d="M17 5v14"/>
    <path d="M21 5v14"/>
  </g>

  <!-- "shopmeta.ai" text — auto-switches dark/light -->
  <text x="110" y="74" class="logo-text">shopmeta.ai</text>
</svg>
